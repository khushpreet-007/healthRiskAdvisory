<select id="ward">
    <option value="Kempegowda Ward" selected>Kempegowda Ward</option>
    <option value="Basaveshwara Nagar">Basaveshwara Nagar</option>
</select>

<script type="module">

    import { initializeApp }
        from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

    import {
        getMessaging,
        getToken,
        onMessage
    }
        from "https://www.gstatic.com/firebasejs/12.16.0/firebase-messaging.js";


    // Firebase configuration
    const firebaseConfig = {
        apiKey: "AIzaSyDC8TBV5wqf2DX9jRblHmZEnv69l6IPr3c",
        authDomain: "imageedit-498605.firebaseapp.com",
        projectId: "imageedit-498605",
        storageBucket: "imageedit-498605.firebasestorage.app",
        messagingSenderId: "931055668161",
        appId: "1:931055668161:web:3a68b7b7f2e63a6b357d40"
    };



    // Initialize Firebase
    const app = initializeApp(firebaseConfig);

    // Initialize Messaging
    const messaging = getMessaging(app);


    if ("serviceWorker" in navigator) {


        navigator.serviceWorker.register(
            "/static/firebase-messaging-sw.js"
        )
            .then((registration) => {

                console.log(
                    "Service worker ready"
                );


                return getToken(messaging, {
                    vapidKey: "BHY9nOF28Gtn92OpQhzZa-LJZEUQd7OY1zsOO06R7V5LwsU0IBg3z7Gg1ARxg4DZZwO2e36epB0bhN7aQyI4XBA",
                    serviceWorkerRegistration: registration
                });


            })
            .then(token => {

                if (!token) {
                    console.error("No FCM token received.");
                    return;
                }

                console.log("FCM TOKEN:", token);
                const ward = document.getElementById("ward").value;
                return fetch("/api/register-device", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        token,
                        ward,
                        role: "elderly"
                    })
                });

            })
            .then(response => response?.json())
            .then(data => {
                if (data) {
                    console.log("Device registered:", data);
                }
            })
            .catch(console.error);

    }

    // Receive foreground notifications
    onMessage(
        messaging,
        payload => {
            console.log(payload);
            const audioUrl = payload.data.audioUrl;
            const audio = new Audio(audioUrl);
            audio.play();
        }
    );
</script>
